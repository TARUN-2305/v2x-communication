# ECO-SYNC V2X — MQTT Broker Config
# Simulates DSRC/C-V2X communication layer

listener 1883
protocol mqtt
allow_anonymous true

# WebSocket listener for browser V2X monitor
listener 9001
protocol websockets
allow_anonymous true

# Persistence (retain BSM/TIM messages)
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information

# V2X message settings
max_queued_messages 2000
retain_available true
max_packet_size 65536
